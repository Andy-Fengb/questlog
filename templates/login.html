<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quest Log · 登录</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
<div class="login-container">
  <div class="login-logo">⚔️</div>
  <h1 class="login-title">Quest Log</h1>
  <p class="login-sub">任务看板 · 积累每一天</p>
  <form id="loginForm" class="login-form">
    <input type="text" id="username" placeholder="用户名" autocomplete="username" required>
    <input type="password" id="pin" placeholder="PIN 码" autocomplete="current-password" required>
    <button type="submit" class="login-btn">进入看板</button>
  </form>
  <p class="login-hint">首次登录将自动创建账号</p>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: document.getElementById('username').value,
      pin: document.getElementById('pin').value,
    }),
  });
  const data = await res.json();
  if (data.success) {
    window.location.href = '/';
  } else {
    alert(data.error || '登录失败');
  }
});
</script>
</body>
</html>
